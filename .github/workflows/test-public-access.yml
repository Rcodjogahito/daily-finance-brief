name: Test Public Access (No Auth)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright-chromium
          npx playwright install --with-deps chromium

      - name: Test sans cookies ni credentials
        run: |
          cat > test_public.js << 'JSEOF'
          const { chromium } = require('playwright-chromium');
          (async () => {
            const url = 'https://daily-finance-brief-cib.streamlit.app';
            console.log('=== TEST ACCES PUBLIC (0 cookie, 0 credential) ===');
            console.log('Simule un utilisateur lambda qui clique le lien\n');

            const browser = await chromium.launch({ headless: true });
            // Context VIERGE - aucun cookie, aucun storage
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 900 },
            });
            const page = await context.newPage();

            // Collecter toutes les redirections HTTP
            const redirects = [];
            page.on('response', resp => {
              if (resp.status() >= 300 && resp.status() < 400) {
                redirects.push(`${resp.status()} ${resp.url().substring(0, 100)}`);
              }
            });

            try {
              await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 30000 });

              // Attendre que JS s'exécute (viewer auth se manifeste en JS)
              await page.waitForTimeout(6000);

              const finalUrl = page.url();
              const title = await page.title().catch(() => 'N/A');
              const bodyText = await page.evaluate(() =>
                document.body ? document.body.innerText.substring(0, 3000) : ''
              ).catch(() => '');

              console.log('--- REDIRECTIONS HTTP ---');
              redirects.forEach(r => console.log(r));

              console.log('\n--- ETAT FINAL ---');
              console.log('URL finale :', finalUrl);
              console.log('Titre      :', title);

              console.log('\n--- CONTENU PAGE (premiers 2000 chars) ---');
              console.log(bodyText || '(vide)');

              // Diagnostic
              console.log('\n--- DIAGNOSTIC ---');
              if (finalUrl.includes('share.streamlit.io') || finalUrl.includes('/-/login')) {
                console.log('❌ VIEWER AUTH ACTIF - page de login Streamlit Cloud detectee');
              } else if (bodyText.toLowerCase().includes('sign in') ||
                         bodyText.toLowerCase().includes('google') ||
                         bodyText.toLowerCase().includes('github') ||
                         bodyText.toLowerCase().includes('connexion')) {
                console.log('❌ VIEWER AUTH ACTIF - boutons de connexion detectes dans le body');
              } else if (bodyText.includes('Traceback') || bodyText.includes('StreamlitAPIException') ||
                         bodyText.includes('Error') || bodyText.includes('Exception')) {
                console.log('❌ ERREUR PYTHON dans l app - traceback detecte');
              } else if (bodyText.includes('Daily Finance') || bodyText.includes('Brief') ||
                         bodyText.includes('Coffee Economics') || title.includes('Finance')) {
                console.log('✅ APP ACCESSIBLE ET FONCTIONNELLE');
              } else if (bodyText.length < 50) {
                console.log('⚠ PAGE VIDE OU EN COURS DE CHARGEMENT');
              } else {
                console.log('? STATUT INCONNU - voir contenu ci-dessus');
              }

            } catch (err) {
              console.error('ERREUR PLAYWRIGHT:', err.message);
            } finally {
              await browser.close();
            }
          })();
          JSEOF
          node test_public.js

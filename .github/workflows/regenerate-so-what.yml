name: Regenerate so_what (backfill)

# Re-enrich heuristic so_what values in historical briefs via Gemini.
# Run manually from GitHub Actions > Regenerate so_what > Run workflow.

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Nombre de jours à backfiller (vide = 7 par défaut, "all" = tous)'
        required: false
        default: '7'
        type: string
      date:
        description: 'Date précise YYYY-MM-DD (optionnel, override --days)'
        required: false
        default: ''
        type: string

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Regenerate so_what
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:   ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          DAYS="${{ github.event.inputs.days || '7' }}"
          if [ -n "$DATE" ]; then
            python -m scripts.regenerate_so_what --date "$DATE"
          elif [ "$DAYS" = "all" ]; then
            python -m scripts.regenerate_so_what --all
          else
            python -m scripts.regenerate_so_what --days "$DAYS"
          fi

      - name: Commit regenerated briefs
        run: |
          git add data/
          git diff --staged --quiet || (
            git commit -m "Regenerate so_what ($(date -u +%Y-%m-%d))"
            git pull --rebase origin master || git pull --rebase origin main || true
            git push
          )
          echo "OK Push terminé"

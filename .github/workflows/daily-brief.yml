name: Daily Finance Brief

# =============================================================================
# DÉCLENCHEMENT
# Deux crons pour couvrir UTC+1 (hiver) et UTC+2 (été) :
#   30 6 * * *  → 08:30 CEST (UTC+2, mars-oct)
#   30 7 * * *  → 08:30 CET  (UTC+1, oct-mars)
# Le pipeline_lock interne empêche tout double-envoi sur la même date.
#
# FIABILITÉ RENFORCÉE : GitHub Actions peut accumuler jusqu'à 30 min de retard.
# Solution complémentaire recommandée : configurer cron-job.org (gratuit) pour
# appeler l'API GitHub dispatch à 06:30 UTC via Personal Access Token.
# URL API : POST https://api.github.com/repos/{owner}/daily-finance-brief/
#           actions/workflows/daily-brief.yml/dispatches
# =============================================================================

on:
  schedule:
    - cron: '30 6 * * *'   # 08:30 Paris UTC+2 (heure d'été)
    - cron: '30 7 * * *'   # 08:30 Paris UTC+1 (heure d'hiver)
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Force send (ignore lock et dedup)'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false   # file d'attente — le dedup guard gère le reste

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20       # Augmenté pour absorber la latence Gemini

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps (WeasyPrint + PDF)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf2.0-0 libffi-dev libcairo2-dev

      - name: Install Python dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Run daily brief pipeline
        run: python -m src.main_brief
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS:          ${{ secrets.RECIPIENTS }}
          STREAMLIT_URL:       ${{ secrets.STREAMLIT_URL }}
          FORCE_SEND:          ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.force_send == 'true' && 'true' || 'false') || 'false' }}
          CHECK_URLS:          'false'

      - name: Commit archive to repo
        if: always()
        run: |
          git config user.name "Daily Brief Bot"
          git config user.email "bot@github-actions.local"
          git add data/
          git diff --staged --quiet || git commit -m "Brief $(date -u +%Y-%m-%d)"
          git pull --rebase origin master || git pull --rebase origin main || true
          git push

      - name: Enrich so_what via Gemini (si disponible)
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:   'gemini-2.5-flash'
        run: |
          # Ne tente la régénération que si la clé est définie
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY non définie — enrichissement so_what ignoré"
            exit 0
          fi
          echo "Enrichissement so_what du brief d'aujourd'hui..."
          python -m scripts.regenerate_so_what --days 1 || echo "Enrichissement échoué — pipeline continue"

      - name: Commit enriched so_what
        if: always()
        run: |
          git add data/
          git diff --staged --quiet || (
            git commit -m "Enrich so_what $(date -u +%Y-%m-%d)"
            git pull --rebase origin master || git pull --rebase origin main || true
            git push
          )
          echo "OK Enrichissement so_what terminé"

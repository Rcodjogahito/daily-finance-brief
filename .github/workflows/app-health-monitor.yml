name: App Health Monitor

# Surveille l'état de l'app toutes les 2h + à chaque push.
# Détecte si l'app dort et envoie une séquence de réveil.
# Se déclenche aussi sur push → vérifie que chaque déploiement est OK.

on:
  push:
    branches: [master, main]
  schedule:
    - cron: '15 */2 * * *'   # Toutes les 2h (décalé 15 min vs keep-alive)
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check and wake app
        run: |
          URL="https://daily-finance-brief-cib.streamlit.app"
          echo "Health check — $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Requête avec suivi de redirects
          HTTP_CODE=$(curl -s -o /tmp/resp.html -w "%{http_code}" \
            -L --max-time 60 --retry 3 --retry-delay 10 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,*/*;q=0.8" \
            -H "Accept-Language: fr-FR,fr;q=0.9" \
            -H "Cache-Control: no-cache" \
            "$URL" || echo "000")

          echo "HTTP final: $HTTP_CODE"
          RESP_SIZE=$(wc -c < /tmp/resp.html 2>/dev/null || echo 0)
          echo "Response size: $RESP_SIZE bytes"

          # Détecter page sleeping Streamlit
          if grep -qiE "gone to sleep|has gone to sleep|wake up|wakeup|app is sleeping" /tmp/resp.html 2>/dev/null; then
            echo "::warning::⚠ APP SLEEPING — lancement séquence de réveil"
            for i in $(seq 1 8); do
              curl -s -o /dev/null -L --max-time 90 \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                "$URL" || true
              echo "Tentative de réveil $i/8"
              sleep 15
            done
            echo "Séquence de réveil terminée"
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "::error::App non joignable (timeout) — vérifier Streamlit Cloud"
          else
            echo "✅ App active — HTTP $HTTP_CODE"
          fi

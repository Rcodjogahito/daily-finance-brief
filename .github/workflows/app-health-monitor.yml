name: App Health Monitor

# Surveille l'état de l'app toutes les 2h + à chaque push.
# NOTE : /_stcore/health retourne TOUJOURS 303 sur Streamlit Cloud (infra nginx),
# même pour les apps publiques. On utilise Playwright pour vérifier l'état réel.

on:
  push:
    branches: [master, main]
  schedule:
    - cron: '15 */2 * * *'   # Toutes les 2h (décalé 15 min vs keep-alive)
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright-chromium
          npx playwright install --with-deps chromium

      - name: Check app health (Playwright)
        env:
          APP_URL: "https://daily-finance-brief-cib.streamlit.app"
          STREAMLIT_EMAIL: ${{ secrets.STREAMLIT_EMAIL }}
          STREAMLIT_PASSWORD: ${{ secrets.STREAMLIT_PASSWORD }}
        run: |
          cat > health_check.js << 'EOF'
          const { chromium } = require('playwright-chromium');

          (async () => {
            const url = process.env.APP_URL;
            const email = process.env.STREAMLIT_EMAIL;
            const password = process.env.STREAMLIT_PASSWORD;

            console.log(`=== App Health Monitor — ${new Date().toISOString()} ===`);
            console.log(`Target: ${url}`);

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 720 },
            });
            const page = await context.newPage();

            try {
              await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
              await page.waitForTimeout(3000);

              const finalUrl = page.url();

              // Viewer auth = redirigé vers /-/login ou share.streamlit.io ET BLOQUÉ
              // (pour apps publiques, Playwright passe à travers le check d'auth sans s'arrêter)
              const isBlockedByAuth = (
                finalUrl.includes('/-/login') ||
                (finalUrl.includes('share.streamlit.io') && !finalUrl.includes('redirect_uri'))
              );

              if (isBlockedByAuth) {
                // Tenter auth avec credentials si disponibles
                if (email && password) {
                  console.log('🔑 Auth requise — tentative avec credentials...');
                  const googleBtn = page.locator('button:has-text("Google"), a:has-text("Google")').first();
                  if (await googleBtn.isVisible({ timeout: 3000 }).catch(() => false)) {
                    await googleBtn.click();
                    await page.waitForTimeout(3000);
                    const emailField = page.locator('input[type="email"], #identifierId').first();
                    if (await emailField.isVisible({ timeout: 5000 }).catch(() => false)) {
                      await emailField.fill(email);
                      await page.keyboard.press('Enter');
                      await page.waitForTimeout(2000);
                      const pwdField = page.locator('input[type="password"]').first();
                      if (await pwdField.isVisible({ timeout: 5000 }).catch(() => false)) {
                        await pwdField.fill(password);
                        await page.keyboard.press('Enter');
                        await page.waitForTimeout(3000);
                      }
                    }
                  }
                } else {
                  console.log('::error::🔒 VIEWER AUTH BLOQUANT — app inaccessible sans credentials');
                  process.exitCode = 1;
                  await browser.close();
                  return;
                }
              }

              const bodyText = await page.evaluate(() => document.body ? document.body.innerText : '').catch(() => '');
              const title = await page.title().catch(() => '');
              const currentUrl = page.url();

              console.log(`Titre : ${title}`);
              console.log(`URL   : ${currentUrl}`);

              const sleepingPatterns = [/gone to sleep/i, /has gone to sleep/i, /inactivit/i, /wake.*up/i, /get this app back/i];
              const isSleeping = sleepingPatterns.some(p => p.test(bodyText));

              if (isSleeping) {
                console.log('::warning::💤 App DORMANTE — le keep-alive la réveillera dans 30 min');
              } else if (title.includes('Streamlit') || title.includes('Finance') || title.includes('Brief')) {
                console.log('✅ App ACTIVE et accessible');
              } else if (currentUrl.includes('/-/login') || currentUrl.includes('share.streamlit.io/-/auth')) {
                console.log('::error::🔒 Viewer auth actif et bloquant');
                process.exitCode = 1;
              } else {
                console.log(`::warning::Statut inconnu — titre: "${title}" | URL: ${currentUrl}`);
              }

            } catch (err) {
              console.error(`::error::❌ Erreur : ${err.message}`);
              process.exitCode = 1;
            } finally {
              await browser.close();
            }
          })();
          EOF
          node health_check.js

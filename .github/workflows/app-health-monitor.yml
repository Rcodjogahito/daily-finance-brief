name: App Health Monitor

# Surveille l'état de l'app toutes les 2h + à chaque push.
# Sur push → le keep-alive.yml se charge du wake (il est aussi déclenché sur push).
# Ici : diagnostics, détection sleeping, alertes GitHub.

on:
  push:
    branches: [master, main]
  schedule:
    - cron: '15 */2 * * *'   # Toutes les 2h (décalé 15 min vs keep-alive)
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check app health
        run: |
          URL="https://daily-finance-brief-cib.streamlit.app"
          HEALTH_URL="${URL}/_stcore/health"
          echo "=== App Health Monitor — $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="

          # 1. Health endpoint — capture aussi la Location header pour détecter viewer auth
          HEALTH_RESP=$(curl -sI --max-time 15 "$HEALTH_URL" 2>/dev/null)
          HEALTH=$(echo "$HEALTH_RESP" | grep -oE "HTTP/[0-9.]+ [0-9]+" | tail -1 | grep -oE "[0-9]+$" || echo "000")
          HEALTH_LOC=$(echo "$HEALTH_RESP" | grep -i "^Location:" | head -1 || echo "")
          echo "/_stcore/health → HTTP $HEALTH | Location: ${HEALTH_LOC:-none}"

          # Détecter viewer auth via le header Location (303 → /-/auth/app ou /-/login)
          if echo "$HEALTH_LOC" | grep -qE "/-/auth/app|/-/login|share\.streamlit\.io"; then
            echo "::error::🔒 VIEWER AUTH ACTIVE — l'app redirige vers la page de connexion"
            echo "::error::Solution : Streamlit Cloud → app Settings → Sharing → 'Anyone' (public)"
            echo "::error::Sans ça, le keep-alive et les visiteurs externes sont bloqués."
            exit 0
          fi

          # 2. Page principale avec User-Agent browser (sans suivre les redirects — on les analyse)
          HTTP_HEADERS=$(curl -sI --max-time 15 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "$URL" 2>/dev/null || echo "")
          HTTP_CODE=$(echo "$HTTP_HEADERS" | grep -oE "HTTP/[0-9.]+ [0-9]+" | tail -1 | grep -oE "[0-9]+$" || echo "000")
          HTTP_LOC=$(echo "$HTTP_HEADERS"  | grep -i "^Location:" | head -1 || echo "")

          echo "Page principale → HTTP $HTTP_CODE | Location: ${HTTP_LOC:-none}"

          # 3. Diagnostic
          if echo "$HTTP_LOC" | grep -qE "/-/auth/app|/-/login|share\.streamlit\.io"; then
            echo "::error::🔒 VIEWER AUTH ACTIVE — redirection vers login"
            echo "::error::Solution : Streamlit Cloud → Settings → Sharing → 'Anyone' (public)"

          elif [ "$HTTP_CODE" = "000" ]; then
            echo "::error::❌ App non joignable (timeout) — vérifier Streamlit Cloud"

          elif [ "$HEALTH" = "200" ] || echo "$HTTP_CODE" | grep -qE "^[23]"; then
            echo "✅ App ACTIVE — HTTP $HTTP_CODE | health $HEALTH"

          elif echo "$HTTP_CODE" | grep -qE "^[45]"; then
            # Récupérer le corps pour diagnostic sleeping
            BODY=$(curl -sL --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "$URL" 2>/dev/null | head -c 1000 || echo "")
            if echo "$BODY" | grep -qiE "gone to sleep|has gone to sleep|sleeping|wake.*up|inactivit"; then
              echo "::warning::💤 APP DORMANTE — keep-alive.yml devrait la waker (déclenché aussi sur push)"
              echo "Si l'app reste endormie : visiter manuellement ${URL} et cliquer 'Wake up'"
            else
              echo "::warning::Statut inattendu — HTTP $HTTP_CODE | health $HEALTH"
              echo "$BODY" | head -c 300
            fi

          else
            echo "::warning::Statut inattendu — HTTP $HTTP_CODE | health $HEALTH"
          fi

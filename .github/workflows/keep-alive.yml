name: Streamlit Keep-Alive

# Ping l'app toutes les 30 minutes — 48 fois/jour.
# Streamlit Community Cloud endort les apps après 7 jours d'inactivité.
# 48 pings/jour = impossibilité totale de dormir.
# Le job dure ~20 secondes → ~16 min/jour de GitHub Actions (dans les limites gratuites).

on:
  schedule:
    - cron: '*/30 * * * *'   # Toutes les 30 minutes, 24h/24
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping Streamlit app
        run: |
          URL="https://daily-finance-brief-cib.streamlit.app"

          # Ping principal avec suivi de redirects (-L) + headers navigateur
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -L --max-time 45 --retry 2 --retry-delay 5 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,*/*;q=0.8" \
            -H "Accept-Language: fr-FR,fr;q=0.9,en;q=0.8" \
            -H "Cache-Control: no-cache" \
            "$URL" || echo "000")

          echo "$(date -u +%H:%M:%SZ) — HTTP $STATUS — $URL"

          # Ping secondaire health endpoint
          curl -s -o /dev/null -L --max-time 15 \
            -H "User-Agent: Mozilla/5.0 (compatible)" \
            "$URL/_stcore/health" || true

          # Alerte si l'app ne répond plus
          if [ "$STATUS" = "000" ]; then
            echo "::warning::App non joignable — vérifier le déploiement Streamlit Cloud"
          fi

name: Streamlit Keep-Alive

# ARCHITECTURE DE KEEP-ALIVE :
#
# Ce workflow tourne toutes les 30 minutes et sur chaque push (master/main).
# Il utilise Playwright (navigateur headless) pour simuler une vraie session,
# waker l'app si elle dort, et maintenir la connexion WebSocket active.
#
# IMPORTANT — Pour que le bot puisse waker l'app sans credentials :
#   → Désactiver le viewer auth sur Streamlit Cloud :
#     share.streamlit.io → app Settings → Sharing → "This app is public"
#   L'app garde sa propre sécurité via DASHBOARD_PASSWORD dans st.secrets.
#
# Si vous préférez garder le viewer auth activé, ajouter ces secrets GitHub :
#   STREAMLIT_EMAIL    : codjogahito@gmail.com
#   STREAMLIT_PASSWORD : App Password Google (https://myaccount.google.com/apppasswords)

on:
  schedule:
    - cron: '*/30 * * * *'   # Toutes les 30 minutes
  push:
    branches: [master, main]  # Aussi sur chaque push (re-active le schedule + wake immédiat)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright-chromium
          npx playwright install --with-deps chromium

      - name: Keep app alive (Playwright)
        env:
          APP_URL: "https://daily-finance-brief-cib.streamlit.app"
          STREAMLIT_EMAIL: ${{ secrets.STREAMLIT_EMAIL }}
          STREAMLIT_PASSWORD: ${{ secrets.STREAMLIT_PASSWORD }}
        run: |
          cat > keep_alive.js << 'EOF'
          const { chromium } = require('playwright-chromium');

          (async () => {
            const url = process.env.APP_URL;
            const email = process.env.STREAMLIT_EMAIL;
            const password = process.env.STREAMLIT_PASSWORD;

            console.log(`\n=== Streamlit Keep-Alive — ${new Date().toISOString()} ===`);
            console.log(`Target: ${url}`);

            // ── Pré-check : endpoint santé interne (toujours public)
            try {
              const { execSync } = require('child_process');
              const h = execSync(
                `curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${url}/_stcore/health" 2>/dev/null || echo "000"`
              ).toString().trim();
              console.log(`/_stcore/health → HTTP ${h}`);
            } catch (e) {
              console.log(`Health check error: ${e.message}`);
            }

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 720 },
            });
            const page = await context.newPage();

            try {
              console.log('Navigating to app...');
              await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
              await page.waitForTimeout(2000);  // Laisser le JS s'exécuter

              const finalUrl = page.url();
              console.log(`Final URL after load: ${finalUrl}`);

              // ── CAS 1 : Viewer auth (share.streamlit.io ou /-/login) ──────
              // Streamlit Cloud redirige vers /-/login puis share.streamlit.io/-/auth
              const isViewerAuth = (
                finalUrl.includes('share.streamlit.io') ||
                finalUrl.includes('accounts.google.com') ||
                finalUrl.includes('/-/login') ||
                finalUrl.includes('/-/auth')
              );
              if (isViewerAuth) {
                console.log('🔒 VIEWER AUTH DÉTECTÉ (URL: ' + finalUrl.split('?')[0] + ')');

                if (!email || !password) {
                  console.log('❌ Pas de credentials — keep-alive impossible avec viewer auth actif.');
                  console.log('   Fix : share.streamlit.io → app → Settings → Sharing → "This app is public"');
                  process.exitCode = 1;
                  await browser.close();
                  return;
                }

                console.log(`🔑 Credentials trouvés — tentative d'auth (${email})...`);

                // Chercher le bouton GitHub d'abord (plus fiable que Google dans CI)
                const githubBtn = page.locator([
                  'button:has-text("GitHub")',
                  'a:has-text("GitHub")',
                  '[data-provider="github"]',
                  '[aria-label*="GitHub"]',
                ].join(', ')).first();

                const googleBtn = page.locator([
                  'button:has-text("Google")',
                  'a:has-text("Google")',
                  '[data-provider="google"]',
                  '[aria-label*="Google"]',
                ].join(', ')).first();

                let authClicked = false;

                // Tenter GitHub OAuth en premier
                if (await githubBtn.isVisible({ timeout: 3000 }).catch(() => false)) {
                  console.log('  → Clic bouton GitHub...');
                  await githubBtn.click();
                  await page.waitForNavigation({ timeout: 15000 }).catch(() => {});
                  authClicked = true;
                }
                // Fallback Google OAuth
                else if (await googleBtn.isVisible({ timeout: 3000 }).catch(() => false)) {
                  console.log('  → Clic bouton Google...');
                  await googleBtn.click();
                  await page.waitForNavigation({ timeout: 15000 }).catch(() => {});
                  authClicked = true;
                }

                if (authClicked) {
                  // Email field
                  const emailField = page.locator('input[type="email"], input[name="identifier"], input[name="login"], #identifierId').first();
                  if (await emailField.isVisible({ timeout: 10000 }).catch(() => false)) {
                    await emailField.fill(email);
                    await page.keyboard.press('Enter');
                    await page.waitForTimeout(2000);
                  }

                  // Password field
                  const pwdField = page.locator('input[type="password"], input[name="password"], input[name="Passwd"]').first();
                  if (await pwdField.isVisible({ timeout: 10000 }).catch(() => false)) {
                    await pwdField.fill(password);
                    await page.keyboard.press('Enter');
                    await page.waitForNavigation({ timeout: 20000 }).catch(() => {});
                  }
                }

                console.log(`  → URL après auth : ${page.url()}`);
                await page.waitForTimeout(3000);
              }

              // ── CAS 2 : App endormie ──────────────────────────────────
              // Ne pas analyser le sleeping si on est sur une page d'auth
              // (la page /-/login peut contenir "inactivit" pour une raison différente)
              const currentUrl = page.url();
              if (currentUrl.includes('/-/login') || currentUrl.includes('share.streamlit.io') || currentUrl.includes('accounts.google.com')) {
                console.log('Page d\'auth détectée — impossible de waker sans désactiver viewer auth');
                process.exitCode = 1;
                await browser.close();
                return;
              }

              // Récupérer le texte complet de la page pour détecter l'état
              const bodyText = await page.evaluate(() => document.body ? document.body.innerText : '').catch(() => '');
              const pageHtml = await page.content().catch(() => '');

              const sleepingPatterns = [
                /gone to sleep/i, /has gone to sleep/i, /app.*sleep/i,
                /inactivit/i, /wake.*up/i, /get this app back/i,
                /zzzz/i, /dormant/i,
              ];
              const isSleeping = sleepingPatterns.some(p => p.test(bodyText) || p.test(pageHtml));

              if (isSleeping) {
                console.log('💤 App DORMANTE détectée — lancement du réveil...');

                // Sélecteurs larges pour le bouton "wake up"
                const wakeBtnSelectors = [
                  'button:has-text("Yes, get this app back")',
                  'button:has-text("Yes")',
                  'button:has-text("Wake")',
                  'button:has-text("Get this app back")',
                  'button:has-text("Oui")',
                  'button:has-text("Réveiller")',
                  'button:has-text("Reactivate")',
                  'button[class*="wake"]',
                  'button[class*="primary"]',
                  '[data-testid*="wake"]',
                  // Fallback : n'importe quel bouton visible
                  'button:visible',
                ];

                let woke = false;
                for (const sel of wakeBtnSelectors) {
                  try {
                    const btn = page.locator(sel).first();
                    if (await btn.isVisible({ timeout: 2000 }).catch(() => false)) {
                      const btnText = await btn.textContent().catch(() => '?');
                      await btn.click();
                      console.log(`✓ Bouton cliqué : "${btnText.trim()}" (sélecteur: ${sel})`);
                      woke = true;
                      break;
                    }
                  } catch {}
                }

                if (!woke) {
                  console.log('Aucun bouton trouvé — clic sur body + attente...');
                  await page.click('body').catch(() => {});
                }

                // Attendre le démarrage de l'app (peut prendre 30-90s)
                console.log('Attente du démarrage (60s max)...');
                await page.waitForTimeout(15000);  // Premier délai

                // Tentative de navigation après réveil
                try {
                  await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
                  await page.waitForTimeout(15000);
                  console.log(`URL après réveil : ${page.url()}`);
                } catch (e) {
                  console.log(`Navigation post-réveil : ${e.message}`);
                }
              } else {
                console.log('App active — pas en veille');
              }

              // ── ATTENTE LONGUE pour maintien WebSocket ────────────────
              // Streamlit maintient l'app active tant qu'un WebSocket est connecté.
              // On attend 30s pour que la session soit bien enregistrée.
              console.log('Maintien de la connexion WebSocket (30s)...');
              try {
                await page.waitForSelector(
                  '[data-testid="stApp"], [data-testid="stAppViewContainer"], .stApp',
                  { timeout: 30000 }
                );
                console.log('✅ Élément Streamlit détecté');
              } catch {
                console.log('⚠ Élément Streamlit non trouvé (app peut-être encore en cours de boot)');
              }
              await page.waitForTimeout(10000);

              const title = await page.title().catch(() => 'N/A');
              const endUrl = page.url();
              console.log(`\n=== RÉSULTAT ===`);
              console.log(`Titre    : ${title}`);
              console.log(`URL      : ${endUrl}`);
              console.log(`Statut   : ✅ Keep-alive terminé avec succès`);

            } catch (err) {
              console.error(`❌ Erreur Playwright : ${err.message}`);
              process.exitCode = 1;
            } finally {
              await browser.close();
            }
          })();
          EOF

          node keep_alive.js

      - name: Fallback curl + diagnostic
        if: always()
        run: |
          URL="https://daily-finance-brief-cib.streamlit.app"
          echo "=== Fallback curl + diagnostic ==="
          STATUS=$(curl -s -o /tmp/resp.html -w "%{http_code}" -L --max-time 45 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,*/*;q=0.8" \
            -H "Accept-Language: fr-FR,fr;q=0.9,en;q=0.8" \
            "$URL" 2>/dev/null || echo "000")

          echo "HTTP status : $STATUS"
          RESP_BYTES=$(wc -c < /tmp/resp.html 2>/dev/null || echo 0)
          echo "Response size : ${RESP_BYTES} bytes"

          if [ -f /tmp/resp.html ]; then
            if grep -qiE "gone to sleep|sleeping|inactivit|wake.*up" /tmp/resp.html; then
              echo "::warning::💤 App DORMANTE — le bot Playwright devrait la waker dans ce run"
            elif grep -qiE "share\.streamlit\.io/login|viewer.*auth|sign in to view" /tmp/resp.html; then
              echo "::error::🔒 VIEWER AUTH ACTIVE — désactiver dans Streamlit Cloud → Settings → Sharing → Public"
              echo "::error::   OU configurer STREAMLIT_EMAIL + STREAMLIT_PASSWORD dans GitHub Secrets"
            elif [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "✅ App accessible — HTTP $STATUS"
            elif [ "$STATUS" = "000" ]; then
              echo "::error::App non joignable (timeout/erreur réseau)"
            else
              echo "HTTP $STATUS — vérifier Streamlit Cloud"
            fi
          fi
